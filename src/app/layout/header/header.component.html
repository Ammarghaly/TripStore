<nav class="navbar navbar-dark fixed-top border-bottom">
  <div class="container-fluid">
    <div class="d-flex align-items-center gap-4">
      <div class="d-flex align-items-center gap-2">
        <img src="logo.png" alt="Tripia Logo" class="logo-img">
        <span class="brand-name">TRIPIA</span>
      </div>

      <div class="d-none d-md-flex align-items-center gap-3 nav-links">
        <a href="#" class="nav-link-custom">Kits</a>
        <a href="#" class="nav-link-custom">Planner</a>
        <a href="#" class="nav-link-custom">Gear</a>
      </div>
    </div>

    <div class="d-flex align-items-center gap-3">
      <div class="position-relative d-none d-sm-block search-container">
        <input 
          type="text" 
          class="form-control search-input" 
          placeholder="Search curated kits..."
          [(ngModel)]="searchQuery"
          (keyup)="onSearchInput()"
        >
        <i class="bi bi-search search-icon"></i>

        <div class="search-dropdown" *ngIf="showSearchDropdown">
          <div *ngIf="searchResults.length === 0" class="no-results">
            <i class="bi bi-search"></i>
            <p>No products found</p>
          </div>
          
          <div *ngIf="searchResults.length > 0" class="results-list">
            <div 
              class="result-item" 
              *ngFor="let product of searchResults"
              (click)="selectProduct(product)"
            >
              <div class="result-info">
                <p class="result-name">{{ product.name }}</p>
                <p class="result-price">${{ product.price }}</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div *ngIf="!isLoggedIn" class="d-flex align-items-center gap-3">
        <button class="btn btn-login">Login</button>
        <button class="btn btn-register">Sign Up</button>
      </div>

      <div *ngIf="isLoggedIn" class="d-flex align-items-center">
        <div class="cart-dropdown-container me-3">
          <button class="btn icon-btn position-relative" (click)="toggleCartDropdown()">
            <i class="bi bi-bag"></i>
            <span class="cart-badge">{{ cartItems.length }}</span>
          </button>

          <div class="cart-dropdown-menu" *ngIf="showCartDropdown">
            <div class="cart-header">
              <h6>Shopping Cart</h6>
              <span class="cart-count">{{ cartItems.length }} items</span>
            </div>

            <div *ngIf="cartItems.length === 0" class="empty-cart">
              <i class="bi bi-bag-x"></i>
              <p>Your cart is empty</p>
            </div>

            <div *ngIf="cartItems.length > 0" class="cart-items-list">
              <div class="cart-item" *ngFor="let item of cartItems">
                <div class="item-info">
                  <p class="item-name">{{ item.name }}</p>
                  <p class="item-details">{{ item.quantity }} x ${{ item.price }}</p>
                </div>
                <button class="btn-remove" (click)="removeFromCart(item.id)">
                  <i class="bi bi-x"></i>
                </button>
              </div>
            </div>

            <div *ngIf="cartItems.length > 0" class="cart-footer">
              <div class="cart-total">
                <span>Total:</span>
                <span class="total-price">${{ getCartTotal().toFixed(2) }}</span>
              </div>
              <button class="btn btn-view-cart">View Cart</button>
            </div>
          </div>
        </div>

        <div class="user-dropdown-container">
          <button class="btn icon-btn" (click)="toggleUserMenu()">
            <i class="bi bi-person"></i>
          </button>

          <div class="user-dropdown-menu" *ngIf="showUserMenu">
            <div class="user-info">
              <p class="user-name">{{ currentUser.name }}</p>
              <p class="user-email">{{ currentUser.email }}</p>
            </div>
            <hr class="dropdown-divider m-0">
            <button class="dropdown-item" (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i>
              Logout
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>
