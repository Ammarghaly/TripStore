<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <p class="text-uppercase text-muted mb-1" style="font-size: 0.75rem; letter-spacing: 2px; font-weight: 600;">COLLECTIONS</p>
      <h2 class="text-white fw-bold mb-0">Explore Categories</h2>
    </div>
  </div>

  <div class="row gx-3 gy-3">
    @for (category of categoryService.categories(); track category.id) {
      <div class="col-lg-2 col-md-4 col-sm-6 col-6">
        <app-category-card [category]="category" (categoryClick)="onCategoryClick($event)" />
      </div>
    }
  </div>
</div>
