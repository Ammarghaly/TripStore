<div class="container my-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <p class="text-secondary mb-1" style="font-size: 0.85rem; letter-spacing: 2px;">COLLECTIONS</p>
      <h3 class="fw-bold text-white">Explore Categories</h3>
    </div>
  </div>
  <div class="row gx-3 gy-3">
    @for (category of categoryService.categories(); track category.id) {
      <div class="col-lg-2 col-md-3 col-sm-4 col-6">
        <app-category-card [category]="category" (categoryClick)="onCategoryClick($event)" />
      </div>
    }
  </div>
</div>
