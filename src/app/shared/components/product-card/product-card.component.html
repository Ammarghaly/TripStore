<div
  class="card shadow-sm border-0 bg-dark text-white "
  (click)="goToDetails()"
  style="cursor: pointer"
>
  <img [src]="products.imageUrl" class="card-img-top" style="height: 280px; object-fit: cover" />

  <div class="card-body d-flex flex-column">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h6 class="fw-bold">{{ products.name }}</h6>
      <h6 class="fw-bold text-secondary">{{ products.price }} $</h6>
    </div>
    <div class="mb-2">
    <span class="text-warning">
      ★★★★☆ 
    </span>
  </div>
    <button class="btn btn-success w-100" (click)="onAddToCart(); $event.stopPropagation()">
      Add to Cart
    </button>
  </div>
</div>
