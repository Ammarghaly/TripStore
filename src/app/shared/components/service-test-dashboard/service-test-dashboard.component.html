<div class="dashboard">
  <div class="header">
    <h1>🧪 API Services Test Dashboard</h1>
    <p>Test all integration services with interactive cards</p>
  </div>

  <div class="tabs">
    <button
      *ngFor="let tab of ['auth', 'product', 'cart', 'order']"
      (click)="selectTab(tab)"
      [class.active]="activeTab === tab"
      class="tab-button"
    >
      <span class="tab-icon">
        <span *ngIf="tab === 'auth'">🔐</span>
        <span *ngIf="tab === 'product'">📦</span>
        <span *ngIf="tab === 'cart'">🛒</span>
        <span *ngIf="tab === 'order'">📋</span>
      </span>
      <span class="tab-label">
        <span *ngIf="tab === 'auth'">Authentication</span>
        <span *ngIf="tab === 'product'">Products</span>
        <span *ngIf="tab === 'cart'">Cart</span>
        <span *ngIf="tab === 'order'">Orders</span>
      </span>
    </button>
  </div>

  <div class="content">
    <div *ngIf="activeTab === 'auth'" class="tab-content">
      <app-auth-test-card></app-auth-test-card>
    </div>

    <div *ngIf="activeTab === 'product'" class="tab-content">
      <app-product-test-card></app-product-test-card>
      <div class="product-list">
        <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
      </div>
    </div>

    <div *ngIf="activeTab === 'cart'" class="tab-content">
      <app-cart-test-card></app-cart-test-card>
    </div>

    <div *ngIf="activeTab === 'order'" class="tab-content">
      <app-order-test-card></app-order-test-card>
    </div>
  </div>

  <div class="footer">
    <div class="info-box">
      <h3>📚 API Services Integration</h3>
      <ul>
        <li><strong>Auth:</strong> Register, Login, Get User ID</li>
        <li><strong>Products:</strong> Search, Filter, Sort products</li>
        <li><strong>Cart:</strong> Add, Remove, Update items</li>
        <li><strong>Orders:</strong> Create orders, Clear cart on checkout</li>
      </ul>
    </div>
  </div>
</div>
