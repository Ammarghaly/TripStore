<div class="container my-4">

  <h4 class="fw-bold mb-3 text-white">Popular Products</h4>

  <div class="row">

    @for (product of productService.ptoducts(); track product.id) {

      <div class="col-md-3 mb-4">
        <app-product-card
          [products]="product">
        </app-product-card>
      </div>

    }

  </div>

</div>
