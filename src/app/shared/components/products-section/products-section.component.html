<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold text-white">Featured Kits</h3>
    <a routerLink="/products" class="text-success text-decoration-none">View all kits →</a>
  </div>
  <div class="row gx-3 gy-4">
    <div 
      class="col-lg-3 col-md-4 col-sm-6"
      *ngFor="let product of productService.products().slice(0, 4)">
      <app-product-card
        [product]="product"
        (addToCart)="handleAddToCart($event)">
      </app-product-card>
    </div>
  </div>
</div>
