<div class="container py-4">
  <div class="row gx-3 gy-4 justify-content-center">
    
    <div 
      class="col-md-3"
      *ngFor="let product of productService.products().slice(0, 4)">
      
      <app-product-card
        [products]="product"
        (addToCart)="handleAddToCart($event)">
      </app-product-card>

    </div>

  </div>
</div>
