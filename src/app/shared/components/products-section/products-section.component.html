<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-white fw-bold mb-0">Featured Kits</h2>
    <a routerLink="/products" class="text-success text-decoration-none d-flex align-items-center gap-2">
      View all kits
      <i class="bi bi-box-arrow-up-right"></i>
    </a>
  </div>
  <div class="row gx-2 gy-3">
    <div 
      class="col-lg-3 col-md-4 col-sm-6"
      *ngFor="let product of productService.products().slice(0, 4)">
      <app-product-card
        [product]="product"
        (addToCart)="handleAddToCart($event)">
      </app-product-card>
    </div>
  </div>
</div>
