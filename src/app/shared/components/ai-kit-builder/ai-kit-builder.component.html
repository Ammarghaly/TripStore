<div class="ai-kit-section">
  <div class="ai-card">
    <div class="icon-background">
      <img src="Ai-Icon.png" alt="AI Icon" class="ai-icon">
    </div>
    
    <div class="content-wrapper">
      <div class="text-content">
        <h1 class="heading">Build your kit with AI</h1>
        <p class="description">Tell us about your next adventure, and we'll generate the ultimate equipment list tailored just for you.</p>
      </div>

      <div class="controls">
        <div class="form-group">
          <label>TRIP TYPE</label>
          <select>
            <option value="picnic">Picnic</option>
            <option value="beach">Beach</option>
            <option value="bbq">BBQ</option>
            <option value="camping">Camping</option>
            <option value="fishing">Fishing</option>
            <option value="hiking">Hiking</option>
          </select>
        </div>

        <div class="form-group">
          <label>GROUP TYPE</label>
          <select>
            <option value="family">Family</option>
            <option value="friends">Friends</option>
            <option value="family-kids">Family with Kids</option>
          </select>
        </div>

        <div class="form-group">
          <label>DURATION</label>
          <select>
            <option value="day">Day Trip</option>
            <option value="weekend">Weekend</option>
            <option value="week">Week</option>
            <option value="extended">Extended</option>
          </select>
        </div>

        <div class="form-group">
          <label>COMPANIONS</label>
          <select>
            <option value="1">1 Person</option>
            <option value="2">2 People</option>
            <option value="3">3 People</option>
            <option value="4">4 People</option>
          </select>
        </div>

        <div class="form-group">
          <label>PETS INCLUDED?</label>
          <select>
            <option value="no">No Pets</option>
            <option value="dog">Dog</option>
            <option value="cat">Cat</option>
          </select>
        </div>

        <div class="form-group">
          <label>BUDGET RANGE</label>
          <select>
            <option value="economy">Economy</option>
            <option value="medium">Medium</option>
            <option value="premium">Premium</option>
          </select>
        </div>

        <button type="button" class="generate-btn">Generate Kit</button>
      </div>
    </div>
  </div>
</div>
