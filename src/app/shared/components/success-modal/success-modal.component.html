<!-- Blurred backdrop — only rendered when isVisible is true -->
<div
  class="sm-backdrop"
  *ngIf="isVisible"
  (click)="onBackdropClick()"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="'successModalTitle'"
>
  <!-- Bootstrap-style dialog — stopPropagation prevents backdrop click from firing -->
  <div class="modal-dialog modal-dialog-centered sm-dialog" (click)="$event.stopPropagation()">
    <div class="modal-content sm-content">

      <!-- Animated SVG check-circle -->
      <div class="sm-icon-wrap">
        <svg class="sm-svg" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle class="sm-circle" cx="26" cy="26" r="25" fill="none"/>
          <polyline class="sm-check" points="14,27 22,35 38,17" fill="none"/>
        </svg>
      </div>

      <!-- Heading -->
      <h2 class="sm-title" id="successModalTitle">{{ title }}</h2>

      <!-- Sub-text -->
      <p class="sm-sub">{{ message }}</p>

      <!-- CTA button -->
      <button class="sm-btn" type="button" (click)="close()">
        Continue &nbsp;
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
          <path fill-rule="evenodd"
            d="M1 8a.5.5 0 0 1 .5-.5h11.086L9.146 4.354a.5.5 0 1 1 .708-.708l4 4a.5.5 0 0 1 0
               .708l-4 4a.5.5 0 0 1-.708-.708L12.586 8.5H1.5A.5.5 0 0 1 1 8z"/>
        </svg>
      </button>

      <p class="sm-dismiss">Click outside to dismiss</p>
    </div>
  </div>
</div>
