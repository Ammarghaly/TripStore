<header class="header">
  <div class="logo">
    <img src="Container.png" alt="logo" />
  </div>
  <div class="user-info">
    <span>Ready for the wild?</span>
    <button class="user-icon">
      <i class="fa-regular fa-user"></i>
    </button>
  </div>
</header>

<main class="main-container">
  <section class="login-img"></section>
  <img src="Branding.png" alt="login-img" />

  <section class="form">
    <div class="form-content">
      <h2>Welcome Back</h2>
      <p>Enter the frozen wilderness to continue your journey.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">
      <div class="inputs-group">
        <label>Email Address</label>
        <div class="input">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" formControlName="email" placeholder="explorer@tripia.com" required />
        </div>
      </div>

      <div class="inputs-group">
        <div class="label-flex">
          <label>Password</label>
        </div>
        <div class="input">
          <i class="fa-solid fa-lock"></i>
          <input type="password" formControlName="password" placeholder="••••••••" required />
          <i class="fa-regular fa-eye toggle-pass"></i>
        </div>
        <a href="#" class="link-forgot">Forgot?</a>
      </div>

      <!-- رسالة الخطأ -->
      <div *ngIf="loginError" class="error-msg">Incorrect Data</div>

      <button type="submit" class="btn-submit">Login to Expedition</button>
    </form>

    <div class="separator">
      <span>Or Connect Via</span>
    </div>
    <div class="social-buttons">
      <button class="google">
        <i class="fa-brands fa-google"></i>
        Google
      </button>

      <button class="apple">
        <i class="fa-brands fa-apple"></i>
        Apple
      </button>
    </div>
    <p class="footer-note">New explorer? <a href="#">Apply for entry</a></p>
  </section>
</main>
