<div class="cart-item-card p-3 d-flex align-items-center mb-3">
  <!-- Image Container -->
  <div class="item-img-container rounded-3 me-3 overflow-hidden d-flex align-items-center justify-content-center bg-white">
    <img 
      [src]="item.product?.imageUrl || 'assets/placeholder.png'" 
      (error)="$any($event.target).src = 'assets/placeholder.png'"
      alt="Product Image" 
      class="item-img">
  </div>
  
  <!-- Info Section -->
  <div class="flex-grow-1">
    <h5 class="item-title m-0 mb-1 fw-bold text-white">{{ item.product?.name || 'Unknown Item' }}</h5>
    <p class="item-variant m-0 mb-2">
      <span class="text-secondary opacity-75">SKU: TRP-{{ item.productId.toString().padStart(3, '0') }} &bull; {{ getSkuSuffix() }}</span>
    </p>
    <div class="d-flex align-items-center gap-2">
      <span class="badge custom-badge" [ngClass]="getBadgeClass()">
        {{ getBadgeText() }}
      </span>
      <span class="status-text text-secondary opacity-50 small">{{ getBadgeStatus() }}</span>
    </div>
  </div>

  <!-- Actions Section (Quantity, Price, Remove) -->
  <div class="d-flex flex-column align-items-end justify-content-between h-100 ms-3">
    <!-- Quantity Selector -->
    <div class="qty-selector d-flex align-items-center rounded-3 px-1 py-1 mb-3">
      <button class="btn btn-link text-secondary p-1 border-0" (click)="decrement()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M4 8a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7A.5.5 0 0 1 4 8z"/></svg>
      </button>
      <span class="qty-number px-3 text-white fw-bold">{{ item.quantity }}</span>
      <button class="btn btn-link text-secondary p-1 border-0" (click)="increment()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
      </button>
    </div>

    <!-- Price and Remove -->
    <div class="d-flex align-items-center gap-3">
      <span class="price-v2 fw-bold text-white fs-4">${{ item.price | number:'1.2-2' }}</span>
      <button class="btn btn-link text-secondary p-1 border-0 remove-btn" (click)="remove()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
          <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5Zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6Z"/>
          <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1ZM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118ZM2.5 3h11V2h-11v1Z"/>
        </svg>
      </button>
    </div>
  </div>
</div>
