<div class="cart-page-wrapper">
  <!-- Premium Header (Specific to this design request) -->
  <header class="main-header py-3 px-4 d-flex align-items-center justify-content-between">
    <div class="header-left d-flex align-items-center gap-4">
      <div class="logo-container d-flex align-items-center gap-2">
        <div class="logo-icon bg-success rounded-1"></div>
        <span class="logo-text fw-bold text-white fs-5">Tripia</span>
      </div>
      <nav class="d-none d-md-flex gap-4">
        <a href="#" class="nav-link-v2">Shop</a>
        <a href="#" class="nav-link-v2">Adventures</a>
        <a href="#" class="nav-link-v2">Gear</a>
      </nav>
    </div>

    <div class="header-center d-none d-lg-block">
      <!-- Removed MagicPath badge -->
    </div>

    <div class="header-right d-flex align-items-center gap-3">
      <div class="search-box-v2 flex-grow-1">
        <div class="input-group">
          <span class="input-group-text border-0 bg-transparent ps-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="#6b7280" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>
          </span>
          <input type="text" class="form-control border-0 bg-transparent text-white small-input" placeholder="Find gear...">
        </div>
      </div>
      <div class="icon-actions d-flex align-items-center gap-2">
        <div class="cart-icon-v2 position-relative p-2 rounded-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 16 16">
            <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
          </svg>
          <span class="cart-badge badge rounded-pill bg-success">{{ cartDetails.length }}</span>
        </div>
        <div class="user-icon-v2 p-2 rounded-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 16 16">
            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
            <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
          </svg>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <!-- Header Title Area -->
    <div class="row mb-5">
      <div class="col-12 text-white">
        <h1 class="fw-bold cart-title mb-2">Your Gear Bag</h1>
        <p class="text-secondary opacity-75 fs-5">
          You have {{ cartDetails.length }} {{ cartDetails.length === 1 ? 'item' : 'items' }} ready for the next trek.
        </p>
      </div>
    </div>

    <div class="row align-items-start gx-5">
      <!-- Cart Items Section (Left Column) -->
      <div class="col-lg-7 mb-4">
        <ng-container *ngIf="cartDetails.length > 0; else emptyCart">
          <div *ngFor="let item of cartDetails" class="mb-4">
            <app-cart-item
              [item]="item"
              (quantityChange)="onQuantityChange($event)"
              (removeItem)="onRemoveItem($event)"
            >
            </app-cart-item>
          </div>
        </ng-container>

        <!-- Continue Shopping -->
        <div class="mt-5">
          <a routerLink="/" class="continue-shopping-btn d-inline-flex align-items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
            </svg>
            <span>Continue Shopping</span>
          </a>
        </div>
      </div>

      <!-- Order Summary Section (Right Column) -->
      <div class="col-lg-5 sticky-top p-0" style="top: 20px;">
        <app-order-summary
          [subtotal]="subtotal"
          [shippingText]="shippingText"
          [tax]="tax"
          [total]="total"
        >
        </app-order-summary>
      </div>
    </div>
  </main>
</div>

<ng-template #emptyCart>
  <div class="empty-cart-msg p-4 text-center text-secondary rounded-custom">
    Your Gear Bag is empty. Time to gear up!
  </div>
</ng-template>
