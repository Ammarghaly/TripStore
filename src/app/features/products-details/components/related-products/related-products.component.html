<div class="related-products">
  <div class="related-header">
    <div class="header-content">
      <h2>Complete Your Set</h2>
      <p>Frequently bought together with this product</p>
    </div>
    <a routerLink="/products" class="view-all-link">
      View All Kits
      <svg width="7" height="12" viewBox="0 0 7 12" fill="currentColor">
        <path d="M1 1l5 5-5 5"/>
      </svg>
    </a>
  </div>
  
  <div class="products-grid">
    @for (product of products; track product.id) {
      <div class="product-card">
        <div class="product-image" (click)="goToProduct(product.id)">
          <img [src]="product.imageUrl" [alt]="product.name" />
        </div>
        <div class="product-info">
          <div class="product-header">
            <h3 class="product-name">{{product.name}}</h3>
            <span class="product-price">${{product.price}}</span>
          </div>
          <div class="product-rating">
            <span class="stars">★★★★☆</span>
          </div>
          <button class="add-to-cart-btn" (click)="addToCart(product)">
            Add to Cart
          </button>
        </div>
      </div>
    }
  </div>
</div>
