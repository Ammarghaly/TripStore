<h2 class="fw-bold mb-3">
  {{product.name}}
</h2>


<h4 class="text-success mb-3">
  ${{product.price}}
</h4>


<p class="text-muted mb-4">
  {{product.description}}
</p>


<p class="fw-semibold">
  Stock: {{product.stock}}
</p>


<div class="d-flex gap-3 align-items-center my-4">

  <button
  class="btn btn-outline-dark"
  (click)="decreaseQ()">
    -
  </button>


  <span>{{quantity}}</span>


  <button
  class="btn btn-outline-dark"
  (click)="increaseQ()">
    +
  </button>

</div>


<button class="btn btn-success px-5">
  Add To Cart
</button>
